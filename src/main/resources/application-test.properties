# H2 em memória para testes
spring.datasource.url=jdbc:h2:mem:credenciaisdb
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=create
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# AuthServer local
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:9000/oauth2/jwks

# URL base para links nos emails (test)
app.base-url=http://localhost:8082
app.frontend-url=http://localhost:5173

# Upload dir para desenvolvimento local
app.upload.dir=/tmp/credenciais-uploads
