spring.application.name=credenciais
spring.profiles.active=${APP_PROFILE:test}
spring.jpa.open-in-view=false
server.port=8082

# CORS
cors.origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

# JWT - Resource Server (JWK Set URI direto, sem validação de issuer)
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${JWK_SET_URI:http://localhost:9000/oauth2/jwks}

# Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Upload de ficheiros (máx 10MB por ficheiro, 30MB total)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB

# URL base da aplicação (para links nos emails)
app.base-url=${APP_BASE_URL:http://localhost:8082}
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}

# Emails da equipa de segurança (separados por vírgula)
security.notification-emails=${SECURITY_EMAILS:seguranca@mail.com}
